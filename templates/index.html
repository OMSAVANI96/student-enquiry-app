<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Enquiry Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
    <div class="container">
        <div class="card shadow-sm rounded-4 mx-auto" style="max-width: 700px;">
            <div class="card-body p-4 p-md-5">
                <h2 class="text-center mb-4">Student Enquiry Form</h2>
                
                <form id="enquiryForm" action="/submit" method="POST">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Student Name</label>
                            <input type="text" class="form-control" name="student_name" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">WhatsApp Number</label>
                            <input type="tel" class="form-control" name="whatsapp_number" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Date of Birth</label>
                            <input type="date" class="form-control" name="dob">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Guardian Number</label>
                            <input type="tel" class="form-control" name="guardian_number">
                        </div>
                        <div class="col-md-12">
                            <label class="form-label">Address</label>
                            <input type="text" class="form-control" name="address">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Branch</label>
                            <input type="text" class="form-control" name="branch">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Education Details</label>
                            <input type="text" class="form-control" name="education">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Occupation</label>
                            <input type="text" class="form-control" name="occupation">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Interested Course</label>
                            <input type="text" class="form-control" name="course">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Lead Source</label>
                            <select class="form-select" name="lead_source">
                                <option value="Social Media">Social Media</option>
                                <option value="Referral">Referral</option>
                                <option value="Website">Website</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Preferred Call Time</label>
                            <input type="time" class="form-control" name="call_time">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Career Start Timeline</label>
                            <select class="form-select" name="timeline">
                                <option value="Immediately">Immediately</option>
                                <option value="1-3 Months">1-3 Months</option>
                                <option value="Undecided">Undecided</option>
                            </select>
                        </div>
                        <div class="col-12 mt-4">
                            <button type="submit" class="btn btn-primary w-100 py-2">Submit Enquiry</button>
                        </div>
                    </div>
                </form>

            </div>
        </div>
    </div>
</body>
</html>
